<center>
	<h1>Convert between Fahrenheit and Celsius degrees</h1>
<hr>
<a href=../index.html>[ Back to the Chemistry Archive ]</a>
</center>

<center>

Enter a number in either field, then click outside the text box.
<form>
F: <input type="text" name="F" value="32"
    onChange="C.value = 100/(212-32) * (this.value - 32 )"><br>
C: <input type="text" name="C" value="0"
    onChange="F.value = (212-32)/100 * this.value + 32 "><br>
</form>
<hr>
